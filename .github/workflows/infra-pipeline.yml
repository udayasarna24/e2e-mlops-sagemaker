name: Pipeline 1 - Infra - Create SageMaker Studio

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  cdk-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js (required for CDK CLI)
        uses: actions/setup-node@v3
        with:
          node-version: '22'    # ✅ Fixed from 18 to 20

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cdk/requirements.txt
          pip install boto3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap
        run: |
          cd cdk
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }} || true

      - name: CDK Diff
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cd cdk
          cdk diff AdultIncomeSageMakerStack || true

      - name: CDK Deploy
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cd cdk
          cdk deploy AdultIncomeSageMakerStack \
            --require-approval never \
            --outputs-file ../cdk_outputs.json

      - name: Save CDK Outputs to S3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python cdk/save_outputs.py

      - name: Show Infra Outputs
        run: |
          echo "CDK Stack Outputs:"
          cat cdk_outputs.json
          echo "Saved to S3:"
          cat infra_outputs.json